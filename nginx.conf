server {
    listen 80;
    server_name fortepluie.com www.fortepluie.com 31.97.61.12;

    # --- Django API ---
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Django Admin Panel ---
    location /admin/ {
        proxy_pass http://backend:8000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Django Media Files ---
    location /media/ {
        alias /media/;
    }

    # --- Django Static Files (for Admin, etc.) ---
    # This regex specifically matches Django's static folders
    location ~ ^/static/(admin|rest_framework) {
        alias /staticfiles/;
    }

    # --- React App & React Static Files (Catch-all) ---
    # This will now correctly serve:
    # 1. / (the index.html)
    # 2. /login, /categories/ac (React routes)
    # 3. /static/js/main.js (React's own static files)
    # 4. /static/css/main.css (React's own static files)
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}