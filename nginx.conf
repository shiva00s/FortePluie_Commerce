server {
    listen 80;
    server_name fortepluie.com www.fortepluie.com 31.97.61.12;

    # --- React Frontend ---
    location / {
        root /path/to/your/react/build;
        try_files $uri /index.html;
    }

    # --- Django API ---
    location /api/ {
        # FIX: Use the Docker service name 'backend'
        proxy_pass http://backend:8000/api/; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Django Admin Panel ---
    location /admin/ {
        # FIX: Use the Docker service name 'backend'
        proxy_pass http://backend:8000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Django Static Files ---
    location /static/ {
        # FIX: Use the path from your 'collectstatic' output
        # (This assumes you are using a shared volume for static files)
        alias /app/staticfiles/;
    }
}