server {
    listen 80;
    server_name fortepluie.com www.fortepluie.com 31.97.61.12;

    # --- React Frontend ---
    location / {
        # This path comes from your docker-compose volume:
        # - ./frontend/build:/usr/share/nginx/html
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }

    # --- Django API ---
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Django Admin Panel ---
    location /admin/ {
        proxy_pass http://backend:8000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Django Static Files (for Admin) ---
    location /static/ {
        # This path comes from your new docker-compose volume:
        # - static_volume:/staticfiles
        alias /staticfiles/;
    }

    # --- Django Media Files (for user uploads) ---
    location /media/ {
        # This path comes from your existing docker-compose volume:
        # - media_volume:/media
        alias /media/;
    }
}