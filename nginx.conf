server {
    listen 80;
    
    # Use your domain and IP here
    server_name fortepluie.com www.fortepluie.com 31.97.61.12;

    # --- React Frontend ---
    location / {
        root /path/to/your/react/build;
        try_files $uri /index.html;
    }

    # --- Django API ---
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Django Admin Panel ---
    location /admin/ {
        proxy_pass http://127.0.0.1:8000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Django Static Files ---
    location /static/ {
        # Remember to update this path to your project's staticfiles directory
        alias /path/to/your/django_project/staticfiles/;
    }
}