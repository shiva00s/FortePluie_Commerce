version: '3.8'

services:
  backend:
    build: ./backend
    container_name: fortepluie-backend
    volumes:
      - media_volume:/app/media
    expose:
      - 8000
    env_file:
      - ./.env
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: fortepluie-frontend

  db:
    image: postgres:14
    container_name: fortepluie-db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_USER: ecomuser
      POSTGRES_PASSWORD: Shiva@Saara@74482
      POSTGRES_DB: ecomdb
    ports:
      - "5432:5432"

  nginx:
    image: nginx:stable-alpine
    container_name: fortepluie-nginx
    ports:
      - "80:80"
    volumes:
      - ./frontend/build:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - media_volume:/media
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  media_volume: