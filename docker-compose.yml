version: '3.8'

services:
  backend:
    build: ./backend
    container_name: fortepluie-backend
    volumes:
      - ./backend/media:/app/media
    expose:
      - 8000
    env_file:
      - ./.env
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: fortepluie-frontend
    # No ports here; Nginx will handle traffic

  db:
    image: postgres:14
    container_name: fortepluie-db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - ./.env

  nginx:
    image: nginx:stable-alpine
    container_name: fortepluie-nginx
    ports:
      - "80:80" # This is the ONLY public port
    volumes:
      - ./frontend/build:/usr/share/nginx/html # Serve React's static files
      - ./nginx.conf:/etc/nginx/conf.d/default.conf # Use our config file
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data: