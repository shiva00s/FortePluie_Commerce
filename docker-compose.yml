version: '3.8'

services:
  backend:
    build: ./backend
    container_name: fortepluie-backend
    volumes:
      - media_volume:/app/media  # Mount the shared volume here
    expose:
      - 8000
    env_file:
      - ./.env
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: fortepluie-frontend

  db:
    image: postgres:14
    container_name: fortepluie-db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - ./.env

  nginx:
    image: nginx:stable-alpine
    container_name: fortepluie-nginx
    ports:
      - "80:80"
    volumes:
      - ./frontend/build:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - media_volume:/media  # Mount the shared volume here as well
    depends_on:
      - frontend
      - backend

# Define the volumes at the top level
volumes:
  postgres_data:
  media_volume: